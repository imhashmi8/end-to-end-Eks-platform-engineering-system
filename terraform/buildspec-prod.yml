version: 0.2

env:
  shell: bash
  variables:
    TF_IN_AUTOMATION: "true"

phases:
  install:
    commands:
      - echo "Installing Terraform"
      - curl -sSL -o /tmp/terraform.zip https://releases.hashicorp.com/terraform/1.13.5/terraform_1.13.5_linux_amd64.zip
      - unzip -o /tmp/terraform.zip -d /usr/local/bin
      - terraform version
      - echo "Installing kubectl"
      - curl -sSL -o /usr/local/bin/kubectl https://dl.k8s.io/release/v1.30.2/bin/linux/amd64/kubectl
      - chmod +x /usr/local/bin/kubectl
      - kubectl version --client
      - echo "Installing Helm"
      - curl -sSL https://get.helm.sh/helm-v3.18.2-linux-amd64.tar.gz -o /tmp/helm.tar.gz
      - tar -xzf /tmp/helm.tar.gz -C /tmp
      - mv /tmp/linux-amd64/helm /usr/local/bin/helm
      - chmod +x /usr/local/bin/helm
      - helm version
      - echo "Installing eksctl"
      - curl -sSL https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_Linux_amd64.tar.gz -o /tmp/eksctl.tar.gz
      - tar -xzf /tmp/eksctl.tar.gz -C /tmp
      - mv /tmp/eksctl /usr/local/bin/eksctl
      - chmod +x /usr/local/bin/eksctl
      - eksctl version

  build:
    commands:
      - echo "Running Terraform for prod"
      - cd terraform/envs/prod
      - terraform init -reconfigure
      - terraform fmt -check
      - terraform validate
      - echo "Importing existing EKS access entries into Terraform state when present"
      - |
        import_eks_cluster_admin_access() {
          local principal_arn="$1"
          local policy_arn="arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy"
          local entry_key
          local entry_address
          local association_address
          local policy_association_count

          if [ -z "$principal_arn" ]; then
            return 0
          fi

          entry_key="$(printf '%s' "$principal_arn" | sed 's/:/_/g; s#/#_#g')"
          entry_address="module.eks.module.eks.aws_eks_access_entry.this[\"${entry_key}_cluster_admin\"]"
          association_address="module.eks.module.eks.aws_eks_access_policy_association.this[\"${entry_key}_cluster_admin\"]"

          if aws eks describe-access-entry --region "$AWS_DEFAULT_REGION" --cluster-name "$EKS_CLUSTER_NAME" --principal-arn "$principal_arn" >/dev/null 2>&1; then
            echo "EKS access entry already exists for $principal_arn"

            if ! terraform state show "$entry_address" >/dev/null 2>&1; then
              terraform import -var-file=terraform.tfvars -var="aws_profile=" "$entry_address" "${EKS_CLUSTER_NAME}:${principal_arn}"
            else
              echo "Terraform state already contains $entry_address"
            fi

            policy_association_count="$(aws eks list-associated-access-policies --region "$AWS_DEFAULT_REGION" --cluster-name "$EKS_CLUSTER_NAME" --principal-arn "$principal_arn" --query "length(associatedAccessPolicies[?policyArn=='${policy_arn}'])" --output text)"
            if [ "$policy_association_count" = "1" ]; then
              if ! terraform state show "$association_address" >/dev/null 2>&1; then
                terraform import -var-file=terraform.tfvars -var="aws_profile=" "$association_address" "${EKS_CLUSTER_NAME}#${principal_arn}#${policy_arn}"
              else
                echo "Terraform state already contains $association_address"
              fi
            fi
          fi
        }

        import_eks_cluster_admin_access "$INFRA_CODEBUILD_ROLE_ARN"
        import_eks_cluster_admin_access "$APP_CODEBUILD_ROLE_ARN"
      - terraform plan -var-file=terraform.tfvars -var="aws_profile=" -out=tfplan
      - terraform apply -auto-approve tfplan
      - echo "Updating kubeconfig for $EKS_CLUSTER_NAME"
      - aws eks update-kubeconfig --region "$AWS_DEFAULT_REGION" --name "$EKS_CLUSTER_NAME"
      - echo "Verifying EKS admin access for bootstrap"
      - kubectl auth can-i create namespaces --all-namespaces
      - |
        if ! kubectl get namespace argocd >/dev/null 2>&1; then
          echo "Installing ArgoCD"
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply --server-side -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
        else
          echo "argocd namespace already exists; skipping ArgoCD bootstrap"
        fi
      - echo "Waiting for ArgoCD Application CRD"
      - kubectl wait --for=condition=Established crd/applications.argoproj.io --timeout=5m
      - |
        if ! kubectl get application todo-app-prod -n argocd >/dev/null 2>&1; then
          echo "Creating ArgoCD application for prod"
          kubectl apply -f ../../../gitops/prod/application.yaml
        else
          echo "ArgoCD application todo-app-prod already exists; skipping creation"
        fi
      - echo "Preparing AWS Load Balancer Controller IAM policy"
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - POLICY_NAME=AWSLoadBalancerControllerIAMPolicy
      - POLICY_ARN="arn:aws:iam::${ACCOUNT_ID}:policy/${POLICY_NAME}"
      - |
        if ! aws iam get-policy --policy-arn "$POLICY_ARN" >/dev/null 2>&1; then
          echo "Creating AWS Load Balancer Controller IAM policy"
          curl -sSL -o /tmp/aws-lbc-iam-policy.json https://raw.githubusercontent.com/kubernetes-sigs/aws-load-balancer-controller/v2.14.1/docs/install/iam_policy.json
          aws iam create-policy --policy-name "$POLICY_NAME" --policy-document file:///tmp/aws-lbc-iam-policy.json
        else
          echo "AWS Load Balancer Controller IAM policy already exists; skipping policy creation"
        fi
      - echo "Associating IAM OIDC provider"
      - eksctl utils associate-iam-oidc-provider --cluster "$EKS_CLUSTER_NAME" --region "$AWS_DEFAULT_REGION" --approve
      - echo "Creating or updating IRSA service account"
      - eksctl create iamserviceaccount --cluster "$EKS_CLUSTER_NAME" --region "$AWS_DEFAULT_REGION" --namespace kube-system --name aws-load-balancer-controller --role-name "prod-eks-aws-load-balancer-controller" --attach-policy-arn "$POLICY_ARN" --override-existing-serviceaccounts --approve
      - echo "Installing AWS Load Balancer Controller"
      - helm repo add eks https://aws.github.io/eks-charts
      - helm repo update
      - VPC_ID=$(aws eks describe-cluster --name "$EKS_CLUSTER_NAME" --region "$AWS_DEFAULT_REGION" --query 'cluster.resourcesVpcConfig.vpcId' --output text)
      - |
        helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
          -n kube-system \
          --set clusterName="$EKS_CLUSTER_NAME" \
          --set serviceAccount.create=false \
          --set serviceAccount.name=aws-load-balancer-controller \
          --set region="$AWS_DEFAULT_REGION" \
          --set vpcId="$VPC_ID"
