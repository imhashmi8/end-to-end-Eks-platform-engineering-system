apiVersion: v1
kind: Service
metadata:
  name: argocd-server-public
  namespace: argocd
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: argocd-server
  ports:
    - name: https
      port: 8080
      protocol: TCP
      targetPort: 8080
